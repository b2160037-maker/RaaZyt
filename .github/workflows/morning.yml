name: morning-topic

on:
  schedule:
    - cron: "43 0 * * *"     # ~06:13 IST (off-peak minute = less GitHub cron delay)
  workflow_dispatch:          # allow manual run/test

permissions:
  contents: write             # needed to commit today's topic

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Pick topic + notify owner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          RCLONE_REMOTE: ${{ secrets.RCLONE_REMOTE }}
        run: |
          # optional: set up rclone config from secret
          if [ -n "$RCLONE_CONF" ]; then
            sudo apt-get update && sudo apt-get install -y rclone
            mkdir -p ~/.config/rclone
            printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          fi
          python -m src.topic --announce
      - name: Commit today's topic
        run: |
          git config user.name "raaz-bot"
          git config user.email "bot@raaz.local"
          git add thumbnails/TODAY_TOPIC.txt used_topics.json state.json topics.json || true
          git commit -m "topic: $(date +%F)" || echo "no change"
          git push || echo "push skipped"
