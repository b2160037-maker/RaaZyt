name: seo-weekly

on:
  schedule:
    - cron: "13 4 * * 1"     # Monday ~09:43 IST (off-peak minute)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Weekly SEO pass (competitor gaps + analytics + email)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
        run: python -m src.seo --weekly
      - name: Commit expanded topic bank
        if: always()
        run: |
          git config user.name "raaz-bot"
          git config user.email "bot@raaz.local"
          git add topics.json output/seo_report.txt output/seo_report.json || true
          git commit -m "seo weekly: $(date +%F)" || echo "no change"
          git push || echo "push skipped"
