name: publish-video

on:
  schedule:
    - cron: "32 6 * * *"      # ~12:02 PM IST (12 PM, off-peak minute = less GitHub cron delay)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu rclone
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Set up rclone (thumbnail folder)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          if [ -n "$RCLONE_CONF" ]; then
            mkdir -p ~/.config/rclone
            printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          fi
      - name: Build + upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          STABLEHORDE_KEY: ${{ secrets.STABLEHORDE_KEY }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          RCLONE_REMOTE: ${{ secrets.RCLONE_REMOTE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          TTS_VOICE: ${{ secrets.TTS_VOICE }}
          YT_PRIVACY: ${{ secrets.YT_PRIVACY }}
        run: python -m src.run_all
      - name: Commit run log
        if: always()
        run: |
          git config user.name "raaz-bot"
          git config user.email "bot@raaz.local"
          git add output/*/meta.json output/*/qa_report.txt output/*/run_log.json used_topics.json state.json || true
          git commit -m "run: $(date +%F)" || echo "no change"
          git push || echo "push skipped"
      - name: Save outputs as artifact (backup copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output
          path: output/
          retention-days: 14
